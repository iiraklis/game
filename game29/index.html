<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Asteroid Blaster</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
#wrap{position:relative;width:100vw;height:100vh}
#gc{display:block;width:100%;height:100%;background:#000;cursor:none}
#main-menu{position:absolute;top:42px;left:16px;color:#0ff;border:1px solid #0ff;padding:6px 12px;text-decoration:none;font:14px monospace;text-shadow:0 0 6px #0ff;background:rgba(0,0,0,.45);z-index:5}
#score{position:absolute;top:12px;left:16px;color:#0ff;font-size:16px;font-family:monospace;text-shadow:0 0 8px #0ff}
#lives{position:absolute;top:12px;right:16px;color:#f66;font-size:16px;font-family:monospace}
#wave{position:absolute;top:40px;left:50%;transform:translateX(-50%);color:#ff0;font-size:14px;font-family:monospace;opacity:0;transition:opacity .5s}
#over{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;display:none}
#over h2{color:#f66;font-size:28px;font-family:monospace;text-shadow:0 0 12px #f66;margin-bottom:8px}
#over p{color:#aaa;font-family:monospace;font-size:14px;margin-bottom:16px}
#over button{background:transparent;border:1px solid #0ff;color:#0ff;font-family:monospace;font-size:16px;padding:8px 24px;cursor:pointer;text-shadow:0 0 6px #0ff;box-shadow:0 0 6px #0ff}
#start{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
#start h1{color:#0ff;font-size:clamp(20px,5vw,36px);font-family:monospace;text-shadow:0 0 16px #0ff;margin-bottom:8px}
#start p{color:#aaa;font-family:monospace;font-size:clamp(11px,2vw,14px);margin-bottom:6px;line-height:1.6}
#start button{background:transparent;border:1px solid #0ff;color:#0ff;font-family:monospace;font-size:18px;padding:10px 32px;cursor:pointer;text-shadow:0 0 8px #0ff;margin-top:12px}
#dpad{position:absolute;bottom:20px;left:20px;display:none}
#fire-btn{position:absolute;bottom:40px;right:30px;width:64px;height:64px;border-radius:50%;background:rgba(255,100,100,.25);border:2px solid #f66;color:#f66;font-size:22px;cursor:pointer;display:none;align-items:center;justify-content:center}
.dpad-btn{width:52px;height:52px;background:rgba(0,255,255,.15);border:1px solid rgba(0,255,255,.4);color:#0ff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:4px;user-select:none;-webkit-user-select:none}
#dpad-grid{display:grid;grid-template-columns:52px 52px 52px;grid-template-rows:52px 52px;gap:4px}
</style>
</head>
<body>
<div id="wrap">
<canvas id="gc"></canvas>
<a id="main-menu" href="../index.html">Main Menu</a>
<div id="score">SCORE: 0</div>
<div id="lives">♥ ♥ ♥</div>
<div id="wave">WAVE 1</div>
<div id="start">
  <h1>⬡ ASTEROID BLASTER</h1>
  <p>← → повернуть &nbsp;|&nbsp; ↑ тяга &nbsp;|&nbsp; ПРОБЕЛ выстрел</p>
  <p>На телефоне — кнопки внизу экрана</p>
  <button id="startBtn">НАЧАТЬ ИГРУ</button>
</div>
<div id="over">
  <h2>GAME OVER</h2>
  <p id="final-score">Счёт: 0</p>
  <button id="restartBtn">ИГРАТЬ СНОВА</button>
</div>
<div id="dpad">
  <div id="dpad-grid">
    <div></div>
    <div class="dpad-btn" id="btn-up">▲</div>
    <div></div>
    <div class="dpad-btn" id="btn-left">◀</div>
    <div></div>
    <div class="dpad-btn" id="btn-right">▶</div>
  </div>
</div>
<div id="fire-btn" style="display:none">🔴</div>
</div>
<script>
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
const scoreEl=document.getElementById('score');
const livesEl=document.getElementById('lives');
const waveEl=document.getElementById('wave');
const overEl=document.getElementById('over');
const startEl=document.getElementById('start');
const finalScoreEl=document.getElementById('final-score');
const dpad=document.getElementById('dpad');
const fireBtn=document.getElementById('fire-btn');

function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

const isMobile=/Mobi|Android/i.test(navigator.userAgent)||window.innerWidth<700;
if(isMobile){dpad.style.display='block';fireBtn.style.display='flex';}

let keys={},gameRunning=false,score=0,lives=3,wave=0;
let ship,bullets=[],asteroids=[],particles=[],stars=[];
let lastTime=0,shootCooldown=0,invincible=0,waveTimer=0;

function initStars(){stars=[];for(let i=0;i<150;i++)stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.5+.3,b:Math.random()*.7+.3});}
function initShip(){ship={x:canvas.width/2,y:canvas.height/2,vx:0,vy:0,angle:-Math.PI/2,thrusting:false,dead:false};}

function spawnAsteroids(n){
  for(let i=0;i<n;i++){
    let x,y;
    if(Math.random()<.5){x=Math.random()<.5?0:canvas.width;y=Math.random()*canvas.height;}
    else{y=Math.random()<.5?0:canvas.height;x=Math.random()*canvas.width;}
    let angle=Math.random()*Math.PI*2,speed=.8+Math.random()*1.2+wave*.15;
    asteroids.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,size:48+Math.random()*16,hp:3,vertices:genVerts(12)});
  }
}

function genVerts(n){return Array.from({length:n},(_,i)=>{let a=i/n*Math.PI*2,r=.7+Math.random()*.55;return{a,r};});}

function startGame(){
  score=0;lives=3;wave=0;bullets=[];asteroids=[];particles=[];shootCooldown=0;invincible=0;
  initStars();initShip();
  scoreEl.textContent='SCORE: 0';livesEl.textContent='♥ ♥ ♥';
  startEl.style.display='none';overEl.style.display='none';
  gameRunning=true;nextWave();lastTime=performance.now();requestAnimationFrame(loop);
}

function nextWave(){
  wave++;waveEl.textContent='WAVE '+wave;waveEl.style.opacity=1;
  setTimeout(()=>waveEl.style.opacity=0,2000);
  spawnAsteroids(3+wave*2);waveTimer=0;
}

function loop(ts){
  if(!gameRunning)return;
  let dt=Math.min((ts-lastTime)/16.67,3);lastTime=ts;
  update(dt);draw();requestAnimationFrame(loop);
}

function update(dt){
  shootCooldown-=dt;invincible-=dt;waveTimer+=dt;
  if((keys['ArrowLeft']||keys['a']||dKeys.left)&&!ship.dead)ship.angle-=.065*dt;
  if((keys['ArrowRight']||keys['d']||dKeys.right)&&!ship.dead)ship.angle+=.065*dt;
  ship.thrusting=(keys['ArrowUp']||keys['w']||dKeys.up)&&!ship.dead;
  if(ship.thrusting){ship.vx+=Math.cos(ship.angle)*.18*dt;ship.vy+=Math.sin(ship.angle)*.18*dt;}
  ship.vx*=Math.pow(.985,dt);ship.vy*=Math.pow(.985,dt);
  ship.x=(ship.x+ship.vx*dt+canvas.width)%canvas.width;
  ship.y=(ship.y+ship.vy*dt+canvas.height)%canvas.height;
  if((keys[' ']||dKeys.fire)&&shootCooldown<=0&&!ship.dead){
    bullets.push({x:ship.x+Math.cos(ship.angle)*18,y:ship.y+Math.sin(ship.angle)*18,vx:Math.cos(ship.angle)*9+ship.vx,vy:Math.sin(ship.angle)*9+ship.vy,life:55});
    shootCooldown=8;
  }
  bullets=bullets.filter(b=>{b.x=(b.x+b.vx*dt+canvas.width)%canvas.width;b.y=(b.y+b.vy*dt+canvas.height)%canvas.height;b.life-=dt;return b.life>0;});
  for(let a of asteroids){a.x=(a.x+a.vx*dt+canvas.width)%canvas.width;a.y=(a.y+a.vy*dt+canvas.height)%canvas.height;}
  for(let b of bullets){
    for(let a of asteroids){
      let dx=b.x-a.x,dy=b.y-a.y;
      if(dx*dx+dy*dy<a.size*a.size*.6){
        b.life=0;a.hp--;
        explodeParticles(b.x,b.y,6,'#0ff');
        if(a.hp<=0){
          score+=Math.round(100/a.size*40);scoreEl.textContent='SCORE: '+score;
          explodeParticles(a.x,a.y,14,'#f90');
          if(a.size>28){for(let k=0;k<2;k++){let ang=Math.random()*Math.PI*2,sp=1.2+Math.random()*1.5;asteroids.push({x:a.x,y:a.y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,size:a.size*.55,hp:2,vertices:genVerts(10)});}}
          a.hp=-99;
        }
        break;
      }
    }
  }
  asteroids=asteroids.filter(a=>a.hp>-50);
  bullets=bullets.filter(b=>b.life>0);
  if(!ship.dead&&invincible<=0){
    for(let a of asteroids){
      let dx=ship.x-a.x,dy=ship.y-a.y;
      if(dx*dx+dy*dy<(a.size*.7+12)*(a.size*.7+12)){
        lives--;
        livesEl.textContent='♥ '.repeat(Math.max(lives,0)).trim()||'';
        explodeParticles(ship.x,ship.y,20,'#f66');
        invincible=150;
        if(lives<=0){ship.dead=true;setTimeout(gameOver,1200);}
        break;
      }
    }
  }
  if(asteroids.length===0&&waveTimer>90)nextWave();
  for(let p of particles){p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;}
  particles=particles.filter(p=>p.life>0);
}

function explodeParticles(x,y,n,col){
  for(let i=0;i<n;i++){let a=Math.random()*Math.PI*2,s=1+Math.random()*3;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:18+Math.random()*18,maxLife:36,col});}
}

function draw(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let s of stars){ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${s.b})`;ctx.fill();}
  for(let a of asteroids){
    ctx.save();ctx.translate(a.x,a.y);
    ctx.beginPath();
    for(let i=0;i<a.vertices.length;i++){let v=a.vertices[i],r=v.r*a.size;if(i===0)ctx.moveTo(Math.cos(v.a)*r,Math.sin(v.a)*r);else ctx.lineTo(Math.cos(v.a)*r,Math.sin(v.a)*r);}
    ctx.closePath();
    let g=a.size>35?'#555':a.size>22?'#774':'#a74';
    ctx.strokeStyle=g;ctx.lineWidth=2;ctx.stroke();ctx.fillStyle=g+'4';ctx.fill();
    ctx.restore();
  }
  for(let b of bullets){ctx.beginPath();ctx.arc(b.x,b.y,3,0,Math.PI*2);ctx.fillStyle='#0ff';ctx.shadowColor='#0ff';ctx.shadowBlur=8;ctx.fill();ctx.shadowBlur=0;}
  for(let p of particles){let alpha=p.life/p.maxLife;ctx.beginPath();ctx.arc(p.x,p.y,2,0,Math.PI*2);ctx.fillStyle=p.col+(Math.round(alpha*255).toString(16).padStart(2,'0'));ctx.fill();}
  if(!ship.dead&&(invincible<=0||Math.floor(invincible/5)%2===0)){
    ctx.save();ctx.translate(ship.x,ship.y);ctx.rotate(ship.angle);
    ctx.beginPath();ctx.moveTo(18,0);ctx.lineTo(-12,10);ctx.lineTo(-7,0);ctx.lineTo(-12,-10);ctx.closePath();
    ctx.strokeStyle='#0ff';ctx.lineWidth=2;ctx.shadowColor='#0ff';ctx.shadowBlur=6;ctx.stroke();ctx.fillStyle='#0ff2';ctx.fill();ctx.shadowBlur=0;
    if(ship.thrusting){ctx.beginPath();ctx.moveTo(-7,0);ctx.lineTo(-18,4+Math.random()*6);ctx.lineTo(-14,0);ctx.lineTo(-18,-4-Math.random()*6);ctx.closePath();ctx.fillStyle='#f90a';ctx.fill();}
    ctx.restore();
  }
}

function gameOver(){gameRunning=false;finalScoreEl.textContent='Счёт: '+score;overEl.style.display='block';}

document.addEventListener('keydown',e=>{keys[e.key]=true;e.key===' '&&e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

const dKeys={left:false,right:false,up:false,fire:false};
function dBind(id,k){
  const el=document.getElementById(id);
  if(!el)return;
  el.addEventListener('touchstart',e=>{dKeys[k]=true;e.preventDefault();},{passive:false});
  el.addEventListener('touchend',e=>{dKeys[k]=false;e.preventDefault();},{passive:false});
  el.addEventListener('mousedown',()=>dKeys[k]=true);
  el.addEventListener('mouseup',()=>dKeys[k]=false);
}
dBind('btn-left','left');dBind('btn-right','right');dBind('btn-up','up');
fireBtn.addEventListener('touchstart',e=>{dKeys.fire=true;e.preventDefault();},{passive:false});
fireBtn.addEventListener('touchend',e=>{dKeys.fire=false;e.preventDefault();},{passive:false});
fireBtn.addEventListener('mousedown',()=>dKeys.fire=true);
fireBtn.addEventListener('mouseup',()=>dKeys.fire=false);

document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('restartBtn').addEventListener('click',startGame);
</script>
</body>
</html>
